name: CI

# Triggers: pull requests targeting main, plus manual dispatch.
# (Intentionally NOT on push - a compile check on every push to a solo repo isn't worth the minutes.)
# Purpose: verify that both the plugin and the installer compile (no release) and upload artifacts for debugging.
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    # Pinned to windows-2022: it ships Visual Studio 2022, which the CMake
    # "Visual Studio 17 2022" generator needs. windows-latest (windows-2025)
    # fails to locate a VS instance for that generator.
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Build the plugin (CMake configure + build Release), producing build\Release\GBFRUltrawide.asi
      - name: Configure (CMake)
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build plugin (Release)
        run: cmake --build build --config Release

      # Collect dist\ (asi + ini) for the installer build
      - name: Collect plugin artifacts into dist\
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item build\Release\GBFRUltrawide.asi dist\ -Force
          Copy-Item ini\GBFRUltrawide.ini dist\ -Force

      # Build the installer (compile installer\*.cs with csc.exe) to confirm it compiles
      - name: Build installer (csc.exe)
        shell: pwsh
        run: |
          $csc = "$env:WINDIR\Microsoft.NET\Framework64\v4.0.30319\csc.exe"
          if (-not (Test-Path $csc)) {
            $csc = "$env:WINDIR\Microsoft.NET\Framework\v4.0.30319\csc.exe"
          }
          if (-not (Test-Path $csc)) { throw "Could not find .NET Framework csc.exe (v4.0.30319)." }
          Write-Host "Using compiler: $csc"

          New-Item -ItemType Directory -Force -Path installer\out | Out-Null
          $exe = "installer\out\GBFRUltrawideSetup.exe"
          # Glob every .cs so new source files (e.g. Strings.cs) are picked up automatically
          $sources = @(Get-ChildItem installer\*.cs | ForEach-Object { $_.FullName })

          & $csc `
            /nologo `
            /target:winexe `
            /platform:anycpu `
            /optimize+ `
            /codepage:65001 `
            /win32manifest:installer\app.manifest `
            /r:System.dll `
            /r:System.Core.dll `
            /r:System.Windows.Forms.dll `
            /r:System.Drawing.dll `
            "/out:$exe" `
            $sources
          if ($LASTEXITCODE -ne 0) { throw "csc.exe build failed (exit code $LASTEXITCODE)." }
          Write-Host "Build complete: $exe"

      # Upload build artifacts for debugging (asi, ini, installer exe)
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GBFRUltrawide-build
          path: |
            dist/GBFRUltrawide.asi
            dist/GBFRUltrawide.ini
            installer/out/GBFRUltrawideSetup.exe
          if-no-files-found: error
