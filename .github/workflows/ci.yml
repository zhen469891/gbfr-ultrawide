name: CI

# Triggers: pull requests targeting main, plus manual dispatch.
# (Intentionally NOT on push - a compile check on every push to a solo repo isn't worth the minutes.)
# Purpose: verify that the plugin and the installer both compile. The two builds are
# independent, so they run as parallel jobs.
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # Build the ASI plugin (CMake + MSVC)
  plugin:
    # windows-2022 ships VS2022, which the "Visual Studio 17 2022" generator needs.
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v7
      - name: Configure (CMake)
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64
      - name: Build plugin (Release)
        run: cmake --build build --config Release
      - name: Upload plugin artifact
        uses: actions/upload-artifact@v7
        with:
          name: plugin
          path: build/Release/GBFRUltrawide.asi
          if-no-files-found: error

  # Build the installer (compile installer\*.cs with csc.exe) to confirm it compiles
  installer:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v7
      - name: Build installer (csc.exe)
        shell: pwsh
        run: |
          $csc = "$env:WINDIR\Microsoft.NET\Framework64\v4.0.30319\csc.exe"
          if (-not (Test-Path $csc)) { $csc = "$env:WINDIR\Microsoft.NET\Framework\v4.0.30319\csc.exe" }
          if (-not (Test-Path $csc)) { throw "Could not find .NET Framework csc.exe (v4.0.30319)." }
          Write-Host "Using compiler: $csc"
          New-Item -ItemType Directory -Force -Path out | Out-Null
          # Glob every .cs so new source files (e.g. Strings.cs) are picked up automatically
          $sources = @(Get-ChildItem installer\*.cs | ForEach-Object { $_.FullName })
          & $csc `
            /nologo /target:winexe /platform:anycpu /optimize+ /codepage:65001 `
            /win32manifest:installer\app.manifest `
            /r:System.dll /r:System.Core.dll /r:System.Windows.Forms.dll /r:System.Drawing.dll `
            /out:out\GBFRUltrawideSetup.exe $sources
          if ($LASTEXITCODE -ne 0) { throw "csc.exe build failed (exit code $LASTEXITCODE)." }
          Write-Host "Build complete: out\GBFRUltrawideSetup.exe"
      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: installer
          path: out/GBFRUltrawideSetup.exe
          if-no-files-found: error
