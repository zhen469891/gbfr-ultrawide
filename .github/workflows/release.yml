name: Release

# Trigger: a GitHub Release being published (works for pre-releases too).
# You create the release in the GitHub UI (tick "Set as a pre-release" if you want);
# this workflow then builds the plugin and installer IN PARALLEL, bundles a single
# ready-to-use zip, and uploads it back onto that same release. The workflow never
# creates or flips the release itself, so your pre-release choice is preserved.
# Both the plugin and the installer are stamped with the release tag's version
# (v0.2.0 -> 0.2.0) at build time; local builds fall back to 0.0.0-dev. No
# version number lives in source.
on:
  release:
    types: [published]

# Uploading assets onto the release needs write access.
permissions:
  contents: write

jobs:
  # ---- Line 1: build the ASI plugin (CMake + MSVC) ----
  plugin:
    # Pinned to windows-2022: it ships Visual Studio 2022, which the CMake
    # "Visual Studio 17 2022" generator needs. windows-latest (windows-2025)
    # fails to locate a VS instance for that generator.
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name }}
      - name: Configure (CMake), stamped with the release tag version
        shell: pwsh
        run: |
          $version = "${{ github.event.release.tag_name }}".TrimStart('v')
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DGBFR_DEV=OFF "-DGBFR_VERSION=$version"
      - name: Build plugin (Release)
        run: cmake --build build --config Release
      - name: Upload plugin artifact
        uses: actions/upload-artifact@v7
        with:
          name: plugin
          path: build/Release/GBFRUltrawide.asi
          if-no-files-found: error

  # ---- Line 2: build the installer (csc.exe) — independent of the plugin, runs at the same time ----
  installer:
    runs-on: windows-2022  # also ships the .NET Framework 4.x csc.exe the script uses
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name }}
      - name: Build installer, stamped with the release tag version
        shell: pwsh
        run: |
          $version = "${{ github.event.release.tag_name }}".TrimStart('v')
          # The script also assembles installer\out\payload from dist\/redist\; the
          # plugin isn't built in this job, so that part just writes .MISSING.txt
          # notes. Only the exe is taken from here - the package job assembles the
          # real payload from the plugin artifact and repo sources.
          & installer\build_installer.ps1 -Version $version
      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: installer
          path: installer/out/GBFRUltrawideSetup.exe
          if-no-files-found: error

  # ---- Join: combine both build outputs into one ready-to-use zip, attach to the release ----
  package:
    needs: [plugin, installer]
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name }}
      - name: Download plugin artifact
        uses: actions/download-artifact@v8
        with:
          name: plugin
          path: artifacts/plugin
      - name: Download installer artifact
        uses: actions/download-artifact@v8
        with:
          name: installer
          path: artifacts/installer
      - name: Assemble single ready-to-use package
        shell: pwsh
        run: |
          $tag  = "${{ github.event.release.tag_name }}"
          $root = "GBFRUltrawide-$tag"

          # payload\ mirrors the game-directory layout: winmm.dll at the root, the
          # GBFRUltrawide.* files under scripts\. The installer deploys this tree verbatim,
          # and a manual user can just copy the CONTENTS of payload\ into their game folder.
          New-Item -ItemType Directory -Force -Path "$root\payload\scripts" | Out-Null
          Copy-Item artifacts\installer\GBFRUltrawideSetup.exe "$root\GBFRUltrawideSetup.exe"
          Copy-Item redist\winmm.dll                           "$root\payload\winmm.dll"
          Copy-Item artifacts\plugin\GBFRUltrawide.asi         "$root\payload\scripts\GBFRUltrawide.asi"
          Copy-Item ini\GBFRUltrawide.ini                      "$root\payload\scripts\GBFRUltrawide.ini"

          # Short readme covering both install paths
          $readme = @"
          GBFRUltrawide $tag - ultrawide (21:9 / 32:9) fix for Granblue Fantasy Relink v2.0.2

          RECOMMENDED - use the installer:
            Run GBFRUltrawideSetup.exe. It auto-detects the game, backs up any existing
            files, installs, and gives you a GUI to change settings.

          MANUAL - no installer:
            Copy the CONTENTS of the payload\ folder into your game folder
            (...\steamapps\common\Granblue Fantasy Relink) so you end up with:
              <game>\winmm.dll
              <game>\scripts\GBFRUltrawide.asi
              <game>\scripts\GBFRUltrawide.ini

          Uninstall: delete winmm.dll and the scripts\GBFRUltrawide.* files (or use the installer).
          "@
          $readme | Out-File -Encoding utf8 "$root\README.txt"

          Compress-Archive -Path "$root" -DestinationPath "GBFRUltrawide-$tag.zip" -Force
          Get-ChildItem "GBFRUltrawide-$tag.zip"
      - name: Upload package onto the release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" `
            "GBFRUltrawide-${{ github.event.release.tag_name }}.zip" --clobber
