name: Release

# Triggers:
#   1. Pushing a tag matching v* (e.g. v1.0.0) builds and publishes a release automatically
#   2. workflow_dispatch for manual testing (you supply the version)
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag for manual testing (e.g. v0.0.0-test)'
        required: true
        default: 'v0.0.0-test'

# Publishing a release requires write permission
permissions:
  contents: write

jobs:
  release:
    # Pinned to windows-2022: it ships Visual Studio 2022, which the CMake
    # "Visual Studio 17 2022" generator needs. windows-latest (windows-2025)
    # fails to locate a VS instance for that generator.
    runs-on: windows-2022

    steps:
      # 1. Check out the source
      - name: Checkout
        uses: actions/checkout@v4

      # Resolve the version: use github.ref_name for pushed tags, the input value for manual runs.
      # Later steps always reference it via ${{ env.TAG }}.
      - name: Resolve version tag
        id: version
        shell: pwsh
        run: |
          $tag = if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            '${{ github.event.inputs.tag }}'
          } else {
            '${{ github.ref_name }}'
          }
          "TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          # Mark as a pre-release for 0.x versions or any tag with a pre-release suffix (e.g. -beta, -rc1).
          $isPre = ($tag -match '^v0\.') -or ($tag -match '-')
          "PRERELEASE=$($isPre.ToString().ToLower())" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Release tag: $tag (prerelease: $($isPre.ToString().ToLower()))"

      # 2. MSVC toolchain (windows-latest already ships VS2022, so we just use
      #    CMake's Visual Studio 17 2022 generator; no extra action is needed and
      #    cmake is preinstalled on the runner).

      # 3. Build the plugin: CMake configure + build Release, producing build\Release\GBFRUltrawide.asi
      #    (equivalent to build.ps1, but calls cmake directly in the workflow instead of the build script)
      - name: Configure (CMake)
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build plugin (Release)
        run: cmake --build build --config Release

      # Collect the plugin and ini into dist\ for the later installer build and packaging (mirrors build.ps1's dist layout)
      - name: Collect plugin artifacts into dist\
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item build\Release\GBFRUltrawide.asi dist\ -Force
          Copy-Item ini\GBFRUltrawide.ini dist\ -Force
          Get-ChildItem dist\

      # 4. Build the installer: compile installer\*.cs with the csc.exe bundled in .NET Framework 4.8
      #    (equivalent to the compile step in build_installer.ps1, but calls csc directly in the workflow instead of the script)
      - name: Build installer (csc.exe)
        shell: pwsh
        run: |
          $csc = "$env:WINDIR\Microsoft.NET\Framework64\v4.0.30319\csc.exe"
          if (-not (Test-Path $csc)) {
            $csc = "$env:WINDIR\Microsoft.NET\Framework\v4.0.30319\csc.exe"
          }
          if (-not (Test-Path $csc)) { throw "Could not find .NET Framework csc.exe (v4.0.30319)." }
          Write-Host "Using compiler: $csc"

          New-Item -ItemType Directory -Force -Path installer\out | Out-Null
          $exe = "installer\out\GBFRUltrawideSetup.exe"
          # Glob every .cs so new source files (e.g. Strings.cs) are picked up automatically
          $sources = @(Get-ChildItem installer\*.cs | ForEach-Object { $_.FullName })

          & $csc `
            /nologo `
            /target:winexe `
            /platform:anycpu `
            /optimize+ `
            /codepage:65001 `
            /win32manifest:installer\app.manifest `
            /r:System.dll `
            /r:System.Core.dll `
            /r:System.Windows.Forms.dll `
            /r:System.Drawing.dll `
            "/out:$exe" `
            $sources
          if ($LASTEXITCODE -ne 0) { throw "csc.exe build failed (exit code $LASTEXITCODE)." }
          Write-Host "Build complete: $exe"

      # Assemble the installer payload\ (winmm.dll from redist\, asi/ini from dist\)
      - name: Assemble installer payload
        shell: pwsh
        run: |
          $payload = "installer\out\payload"
          New-Item -ItemType Directory -Force -Path $payload | Out-Null
          Copy-Item redist\winmm.dll        (Join-Path $payload 'winmm.dll') -Force
          Copy-Item dist\GBFRUltrawide.asi  (Join-Path $payload 'GBFRUltrawide.asi') -Force
          Copy-Item dist\GBFRUltrawide.ini  (Join-Path $payload 'GBFRUltrawide.ini') -Force
          Get-ChildItem -Recurse installer\out

      # 5. Assemble the release packages
      #    (a) Manual package: mirrors the layout a user extracts into the game root
      #        - winmm.dll (ASI loader, placed in the game root)
      #        - scripts\GBFRUltrawide.asi
      #        - scripts\GBFRUltrawide.ini
      #    (b) Installer package: GBFRUltrawideSetup.exe + payload\{winmm.dll, asi, ini}
      - name: Stage release packages
        shell: pwsh
        run: |
          $tag = $env:TAG

          # (a) Manual package staging
          $manual = "staging\manual"
          New-Item -ItemType Directory -Force -Path "$manual\scripts" | Out-Null
          Copy-Item redist\winmm.dll        "$manual\winmm.dll" -Force
          Copy-Item dist\GBFRUltrawide.asi  "$manual\scripts\GBFRUltrawide.asi" -Force
          Copy-Item dist\GBFRUltrawide.ini  "$manual\scripts\GBFRUltrawide.ini" -Force
          Compress-Archive -Path "$manual\*" -DestinationPath "GBFRUltrawide-$tag.zip" -Force

          # (b) Installer package staging (exe plus payload\)
          $setup = "staging\setup"
          New-Item -ItemType Directory -Force -Path $setup | Out-Null
          Copy-Item installer\out\GBFRUltrawideSetup.exe "$setup\GBFRUltrawideSetup.exe" -Force
          Copy-Item installer\out\payload "$setup\payload" -Recurse -Force
          Compress-Archive -Path "$setup\*" -DestinationPath "GBFRUltrawideSetup-$tag.zip" -Force

          Write-Host "Packaging complete:"
          Get-ChildItem "GBFRUltrawide-$tag.zip", "GBFRUltrawideSetup-$tag.zip"

      # 6. Create/update the release and upload both zips; auto-generate release notes
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: ${{ env.TAG }}
          generate_release_notes: true
          prerelease: ${{ env.PRERELEASE }}
          files: |
            GBFRUltrawide-${{ env.TAG }}.zip
            GBFRUltrawideSetup-${{ env.TAG }}.zip
