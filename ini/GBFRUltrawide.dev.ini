; GBFRUltrawide - development-build-only configuration.
; Only builds made with `build.ps1 -Dev` read this file; release builds never
; touch it. Place next to GBFRUltrawide.ini in <game>\scripts\.
; Missing file = all debug features off.

[Debug - Span HUD]
; Developer/testing helpers only - these have no effect on normal play. This whole
; section is only honored by DEVELOPMENT builds of the plugin (build.ps1 -Dev);
; release builds ignore it entirely.
; Probe logs every unique HUD element that flows through the layout hook (first 200)
; as a "PROBE:" line in GBFRUltrawide.log.
; --- Per-element position overrides (wider than 16:9 only) ---
; Workflow to fill the empty side margins on menus the blocklist keeps at 16:9:
; 1. Set Probe = true below, start the game, open the menus/dialogs where the
;    cutoff looks bad, then quit. Every unique HUD element is logged once as a
;    "PROBE:" line (parent/child ids, size, anchors, px position, verdict) in
;    GBFRUltrawide.log.
; 2. Put the child ids of elements that should hug the true screen edge into
;    EdgeSnapIds: right-side elements (positive px) are pushed right and left-side
;    ones (negative px) left, by the canvas widening delta. For an exact offset use
;    MoveIds with an explicit horizontal delta in canvas units (3840x2160 space).
;    MoveIds wins when an id appears in both. These overrides apply even to elements
;    the menu blocklist keeps at 16:9, and only move positions (no resizing).
; 3. Set Probe back to false.
Probe = false
; Comma-separated element ids, e.g. EdgeSnapIds = 123,456
EdgeSnapIds =
; Comma-separated id:deltaX pairs, e.g. MoveIds = 123:660,456:-660
MoveIds =

[Debug - Backgrounds]
; Developer/testing helpers only - these have no effect on normal play. This whole
; section is only honored by DEVELOPMENT builds of the plugin (build.ps1 -Dev);
; release builds ignore it entirely.
; Probe logs every unique UI background/overlay element that flows through the
; backgrounds hook (first 64) as a "PROBE-BG:" line in GBFRUltrawide.log
; (id, size, widen verdict). Workflow to capture a full-screen overlay quad that
; still renders at 16:9 width (e.g. a combat flash):
; 1. Set Probe = true below, start the game, trigger the artifact a few times, quit.
; 2. In GBFRUltrawide.log, look for PROBE-BG lines whose first sighting matches the
;    artifact moment - w=3840 ids with verdict=not-widened are the candidates.
; 3. Report the id(s); the permanent fix is adding them to the in-code whitelist.
Probe = false

[Debug - Scene]
; Developer/testing helpers only - these have no effect on normal play. This whole
; section is only honored by DEVELOPMENT builds of the plugin (build.ps1 -Dev);
; release builds ignore it entirely.
; Diagnostic levers kept from the combat-flash vertical-bars hunt (RESOLVED - see
; docs/adr/0012: the view-CB +0x59C factor feeds both the scene pass and full-screen
; combat-VFX quads, and the shipping value is now fAspectMultiplier at any non-16:9
; aspect).
; CropFactorOverride: when >= 0 and the screen is wider than 16:9, the +0x59C factor
; is forced to this value instead of the shipping fAspectMultiplier.
;   negative (default -1) = disabled, normal behavior.
CropFactorOverride = -1
; WindowRefOverride: forces the view CB's window-reference pair (+0x594/+0x598) ratio
; to the real screen aspect (built for a theory the crop-factor conclusion made moot;
; kept as a diagnostic). The first fire logs the INCOMING width value.
WindowRefOverride = false

[Debug - Camera]
; Developer/testing helpers only - these have no effect on normal play. This whole
; section is only honored by DEVELOPMENT builds of the plugin (build.ps1 -Dev);
; release builds ignore it entirely.
; CamDiag arms the DIAG-CAM2 camera-distance observation instrumentation (offline
; hunt CAMDIST_HUNT2, 2026-07-10; docs/PATTERNS.md 3.25):
;   - a watchdog samples the main view ctx statics every ~1s: committed/staged
;     |eye-at| distance (units unknown - the raw value tells us meters vs cm),
;     the active camera-behavior object (type id + the +0x1398 distance family)
;     and the manual-camera/recommit mode flags;
;   - counting hooks tally the 4 per-frame eye-commit sites (fires + duplicate
;     commits) and the id-6 camera-message consumer (v1's distance path).
; Nothing is modified; everything logs ON CHANGE only, prefixed "DIAG-CAM2:",
; hard budget 128 lines per session.
; Observation run (Run A) checklist: set this to true AND keep
; [Gameplay Camera Distance] Multiplier = 1.0 in GBFRUltrawide.ini so the
; CamCommitDist hooks stay in counting mode. Play normally: toggle lock-on, let
; combat zoom in/out, stand near walls, open menus/cutscenes - then read the
; DIAG-CAM2 lines. Only engage the multiplier (Run B) after the Run A criteria in
; docs/PATTERNS.md 3.24/3.25 pass.
CamDiag = false
