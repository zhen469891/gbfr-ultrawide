; GBFRUltrawide - ultrawide fix for Granblue Fantasy Relink v2.0.2
; Derived from Lyall's GBFRelinkFix (MIT). Section/key names are kept
; identical to upstream so existing configs carry over.

[GBFRelinkFix Parameters]
; Injection delay in milliseconds.
InjectionDelay = 1000

;;;;;;;;;; General ;;;;;;;;;;

[Custom Resolution]
; Enter your chosen resolution.
; You can leave these at 0 if you want your desktop resolution used instead.
Enabled = true
Width = 0
Height = 0

[Gameplay FOV]
; Allows for modification of gameplay field of view.
; 1.0 = Original FOV, 1.2 = 20% higher FOV for example.
; Note: the multiplier applies to every 3D camera, including cutscenes.
Multiplier = 1

[Gameplay Camera Distance]
; Allows for modification of gameplay camera distance.
; 1.0 = Original distance, 1.2 = 20% further back for example.
Multiplier = 1

;;;;;;;;;; Ultrawide/Narrower Fixes ;;;;;;;;;;

[Fix HUD]
; Resizes HUD to 16:9 and spans backgrounds (fades etc).
Enabled = true

[Span HUD]
; Spans gameplay HUD.
; If set to 0, the HUD aspect ratio will be the same as your resolution's aspect ratio.
; Set to 1.7778 for a 16:9 HUD, 2.38888 for a 21:9 HUD or 3.5537 for a 32:9 HUD for example.
; SpanAllHUD spans every full-screen HUD canvas to the aspect ratio above. Menus, story
; scenes and other fixed-anchor content are automatically kept at 16:9 by a built-in
; blocklist, so it is safe to leave on (the default and recommended setting).
; SpanAllBackgrounds spans all background images (i.e. main menu background etc).
Enabled = true
AspectRatio = 0
SpanAllHUD = true
SpanAllBackgrounds = false

[Fix Aspect Ratio]
; Fixes aspect ratio at <16:9.
Enabled = true

[Fix Nameplates]
; Fixes world-anchored nameplate positioning/scale at >16:9.
; Only active when the screen is wider than 16:9.
Enabled = true

[Fix FOV]
; Fixes FOV at <16:9.
Enabled = true

;;;;;;;;;; Graphical Tweaks ;;;;;;;;;;

[Shadow Quality]
; Set shadow resolution.
; Default ultra = 2048, high = 1024, standard = 256.
Enabled = false
Value = 4096

[Level of Detail]
; Modifies the distance at which objects pop-in.
; Increase to reduce object pop-in.
Multiplier = 1

[Disable TAA]
; Set to true to disable temporal anti-aliasing.
Enabled = false

;;;;;;;;;; Experimental ;;;;;;;;;;

[Raise Framerate Cap]
; Warning! Use at your own risk. It is unknown if this will break parts of the game.
; Physics glitches have been reported when using this option.
; Adjusts the framerate cap to 240fps.
Enabled = false
